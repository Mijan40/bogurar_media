<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>বগুড়ার মিডিয়া</title>
    <style>
        /* ===== গ্লোবাল স্টাইল ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===== প্রধান কার্ড ===== */
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 50px 80px rgba(0, 0, 0, 0.8);
        }

        /* ===== লোগো / অ্যাভাটার ===== */
        .logo {
            font-size: 80px;
            margin-bottom: 10px;
            display: inline-block;
            animation: float 3.5s ease-in-out infinite;
        }

        @keyframes float {
            0%   { transform: translateY(0px); }
            50%  { transform: translateY(-14px); }
            100% { transform: translateY(0px); }
        }

        /* ===== হেডিং ===== */
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
        }

        /* ===== বায়ো ===== */
        .bio {
            color: #e8e8e8;
            font-size: 1.05rem;
            line-height: 1.8;
            margin: 18px 0 28px;
            padding: 0 5px;
        }

        .bio span {
            color: #ffd700;
            font-weight: 600;
        }

        .bio .highlight {
            display: inline-block;
            background: rgba(247, 151, 30, 0.15);
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid rgba(247, 151, 30, 0.25);
        }

        /* ===== বাটন গ্রুপ ===== */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 22px 0 10px;
        }

        .btn {
            padding: 13px 30px;
            border-radius: 60px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.4px;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: #f7971e;
            border-color: #f7971e;
            color: #0f0c29;
            box-shadow: 0 8px 22px rgba(247, 151, 30, 0.3);
        }

        .btn-primary:hover {
            background: #ffd200;
            transform: translateY(-3px);
            box-shadow: 0 14px 30px rgba(247, 151, 30, 0.45);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* ===== স্ট্যাটাস / কাউন্টার ===== */
        .status {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 35px;
            flex-wrap: wrap;
        }

        .status-item {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .status-item strong {
            display: block;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 4px;
            font-weight: 600;
        }

        /* ===== ফুটার ===== */
        .footer {
            margin-top: 32px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        /* ===== রেস্পন্সিভ ===== */
        @media (max-width: 480px) {
            .card { padding: 32px 18px; }
            h1 { font-size: 2.2rem; }
            .logo { font-size: 60px; }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- লোগো -->
        <div class="logo">📺</div>

        <!-- টাইটেল -->
        <h1>বগুড়ার মিডিয়া</h1>
        <div class="subtitle">আপনার বিশ্বস্ত সংবাদ伙伴</div>

        <!-- বায়ো -->
        <div class="bio">
            👋 স্বাগতম! আমরা <span>বগুড়ার মিডিয়া</span> – সত্য, দ্রুত ও নির্ভরযোগ্য সংবাদ পরিবেশনে প্রতিশ্রুতিবদ্ধ।<br />
            <span class="highlight">#বগুড়ার_কণ্ঠ</span>
        </div>

        <!-- বাটন -->
        <div class="btn-group">
            <a href="#" class="btn btn-primary">📬 যোগাযোগ</a>
            <a href="#" class="btn btn-outline">📰 সংবাদ</a>
            <a href="#" class="btn btn-outline">📸 গ্যালারি</a>
        </div>

        <!-- স্ট্যাটাস -->
        <div class="status">
            <div class="status-item">
                <strong>⚡</strong> ২৪/৭ আপডেট
            </div>
            <div class="status-item">
                <strong>🎯</strong> নির্ভুলতা
            </div>
            <div class="status-item">
                <strong>❤️</strong> জনপ্রিয়
            </div>
        </div>

        <!-- ফুটার -->
        <div class="footer">
            © ২০২৬ · বগুড়ার মিডিয়া · সর্বস্বত্ব সংরক্ষিত
        </div>

    </div>

</body>
</html>
